name: Native Windows MSIX

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0."
        required: true
        default: 1.0.0
        type: string
      build_number:
        description: "MSIX fourth version part."
        required: true
        type: string
      identity_name:
        description: "Partner Center Package/Identity/Name value."
        required: true
        default: Malanghub.Malanghub
        type: string
      publisher:
        description: "Partner Center Package/Identity/Publisher value, for example CN=..."
        required: true
        default: CN=Malanghub
        type: string
      publisher_display_name:
        description: "Partner Center publisher display name."
        required: true
        default: Malanghub
        type: string

concurrency:
  group: native-windows-msix
  cancel-in-progress: false

jobs:
  build-msix:
    name: Build Windows MSIX artifact (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            processor: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            processor: arm64
            target: aarch64-pc-windows-msvc
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      BUILD_NUMBER: ${{ inputs.build_number }}
      MSIX_VERSION: ${{ format('{0}.{1}', inputs.version, inputs.build_number) }}
      VITE_API_ADDRESS: ${{ vars.VITE_API_ADDRESS }}
      VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
      VITE_GOOGLE_ANDROID_CLIENT_ID: ${{ vars.VITE_GOOGLE_ANDROID_CLIENT_ID }}
      VITE_GOOGLE_IOS_CLIENT_ID: ${{ vars.VITE_GOOGLE_IOS_CLIENT_ID }}
      VITE_GOOGLE_ANDROID_REDIRECT_URI: ${{ vars.VITE_GOOGLE_ANDROID_REDIRECT_URI }}
      VITE_GOOGLE_IOS_REDIRECT_URI: ${{ vars.VITE_GOOGLE_IOS_REDIRECT_URI }}
      VITE_TINY_API_KEY: ${{ secrets.VITE_TINY_API_KEY }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        run: pnpm --filter native release:version "$env:RELEASE_VERSION" "$env:BUILD_NUMBER"

      - name: Build Windows release executable
        run: pnpm --filter native tauri build --target ${{ matrix.target }} --no-bundle --ci

      - name: Decode optional MSIX signing certificate
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
        run: |
          if ($env:WINDOWS_PFX_BASE64) {
            $pfxPath = Join-Path $env:RUNNER_TEMP "malanghub-msix-signing.pfx"
            [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
            "WINDOWS_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Create MSIX artifact
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $msixPath = Join-Path $env:RUNNER_TEMP "Malanghub-$env:MSIX_VERSION-${{ matrix.arch }}.msix"
          $pfxPath = if ($env:WINDOWS_PFX_PATH) { $env:WINDOWS_PFX_PATH } else { "" }
          .\apps\native\scripts\create-msix.ps1 `
            -IdentityName "${{ inputs.identity_name }}" `
            -Publisher "${{ inputs.publisher }}" `
            -PublisherDisplayName "${{ inputs.publisher_display_name }}" `
            -Version "$env:MSIX_VERSION" `
            -ProcessorArchitecture "${{ matrix.processor }}" `
            -OutputPath "$msixPath" `
            -SignPfxPath "$pfxPath" `
            -SignPfxPassword "$env:WINDOWS_PFX_PASSWORD"
          "MSIX_PATH=$msixPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: malanghub-windows-msix-${{ matrix.arch }}
          path: ${{ runner.temp }}/Malanghub-${{ env.MSIX_VERSION }}-${{ matrix.arch }}.msix
          if-no-files-found: error
