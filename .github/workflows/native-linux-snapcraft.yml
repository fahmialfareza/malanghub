name: Native Linux Snapcraft

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Release build number for traceability."
        required: true
        type: string
      channel:
        description: "Snap Store channel."
        required: true
        default: stable
        type: choice
        options:
          - edge
          - beta
          - candidate
          - stable

concurrency:
  group: native-linux-snapcraft
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish Snap package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply release version
        run: |
          build="${{ inputs.build_number }}"
          major=$((build / 100))
          minor=$(((build % 100) / 10))
          patch=$((build % 10))
          version="${major}.${minor}.${patch}"
          sed -i "s/^version: .*/version: \"${version}\"/" snap/snapcraft.yaml
          echo "Snap release ${version} (${build}) for ${{ matrix.arch }}"

      - name: Write Vite environment for Snap build
        env:
          VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          VITE_TINY_API_KEY: ${{ secrets.VITE_TINY_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          printf 'VITE_API_ADDRESS=%s\nVITE_GOOGLE_CLIENT_ID=%s\nVITE_GOOGLE_CLIENT_SECRET=%s\nVITE_TINY_API_KEY=%s\nVITE_SENTRY_DSN=%s\n' \
            "$VITE_API_ADDRESS" "$VITE_GOOGLE_CLIENT_ID" "$VITE_GOOGLE_CLIENT_SECRET" \
            "$VITE_TINY_API_KEY" "$VITE_SENTRY_DSN" \
            > apps/native/.env.local

      - name: Cache Rust registry for Snap build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: snap-rust-registry-${{ matrix.arch }}-${{ hashFiles('apps/native/src-tauri/Cargo.lock') }}
          restore-keys: snap-rust-registry-${{ matrix.arch }}-

      - name: Build Snap
        id: snapcraft
        uses: canonical/action-build@v1

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: malanghub-snap-${{ matrix.arch }}
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

      - name: Publish Snap to Snapcraft
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          set -euo pipefail
          test -n "$SNAPCRAFT_STORE_CREDENTIALS"
          if ! command -v snapcraft >/dev/null 2>&1; then
            sudo snap install --channel stable --classic snapcraft
          fi
          snapcraft upload "${{ steps.snapcraft.outputs.snap }}" --release "${{ inputs.channel }}"
