name: Native iOS App Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0."
        required: true
        default: 1.0.0
        type: string
      build_number:
        description: "CFBundleVersion for this upload."
        required: true
        type: string
      export_method:
        description: "Xcode export method."
        required: true
        default: app-store-connect
        type: choice
        options:
          - app-store-connect
          - release-testing

concurrency:
  group: native-ios-app-store
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build iOS IPA and upload to App Store Connect
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      BUILD_NUMBER: ${{ inputs.build_number }}
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
      VITE_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.VITE_GOOGLE_ANDROID_CLIENT_ID }}
      VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}
      VITE_GOOGLE_IOS_REDIRECT_URI: ${{ secrets.VITE_GOOGLE_IOS_REDIRECT_URI }}
      VITE_TINY_API_KEY: ${{ secrets.VITE_TINY_API_KEY }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        run: pnpm --filter native release:version "$RELEASE_VERSION" "$BUILD_NUMBER"

      - name: Import Apple signing assets
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64"
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD"
          test -n "$APPLE_KEYCHAIN_PASSWORD"
          test -n "$IOS_PROVISIONING_PROFILE_BASE64"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          printf '%s' "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/apple-distribution.p12"
          security import "$RUNNER_TEMP/apple-distribution.p12" \
            -k build.keychain \
            -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$HOME/Library/MobileDevice/Provisioning Profiles/malanghub-ios.mobileprovision"

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Initialize iOS project
        run: |
          if [ ! -d apps/native/src-tauri/gen/apple ]; then
            pnpm --filter native tauri ios init
          fi

      - name: Build IPA
        run: |
          pnpm --filter native tauri ios build \
            --target aarch64 \
            --export-method "${{ inputs.export_method }}" \
            --build-number "$BUILD_NUMBER" \
            --ci
          ipa_path="$(find apps/native/src-tauri/gen/apple -name '*.ipa' -type f | head -n 1)"
          test -n "$ipa_path"
          echo "IPA_PATH=$ipa_path" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: malanghub-ios-ipa
          path: apps/native/src-tauri/gen/apple/**/*.ipa
          if-no-files-found: error

      - name: Upload IPA to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-package "$IPA_PATH" \
            --api-key "$APP_STORE_CONNECT_KEY_ID" \
            --api-issuer "$APP_STORE_CONNECT_ISSUER_ID"
