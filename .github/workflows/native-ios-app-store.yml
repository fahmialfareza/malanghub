name: Native iOS App Store

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "CFBundleVersion for this upload."
        required: true
        type: string
      export_method:
        description: "Xcode export method."
        required: true
        default: app-store-connect
        type: choice
        options:
          - app-store-connect
          - release-testing

concurrency:
  group: native-ios-app-store
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build iOS IPA and upload to App Store Connect
    runs-on: macos-26
    env:
      BUILD_NUMBER: ${{ inputs.build_number }}
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
      MALANGHUB_IOS_BUNDLE_ID: com.malanghub.native
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
      VITE_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.VITE_GOOGLE_ANDROID_CLIENT_ID }}
      VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}
      VITE_GOOGLE_IOS_REDIRECT_URI: ${{ secrets.VITE_GOOGLE_IOS_REDIRECT_URI }}
      VITE_TINY_API_KEY: ${{ secrets.VITE_TINY_API_KEY }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Activate Rust toolchain
        run: |
          rustup default stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Select Xcode 26 SDK
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_26.4.1.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          iphoneos_sdk="$(xcodebuild -sdk iphoneos -version SDKVersion)"
          case "$iphoneos_sdk" in
            26.*|2[7-9].*)
              echo "Using iPhoneOS SDK $iphoneos_sdk"
              ;;
            *)
              echo "App Store uploads require iOS SDK 26 or later; found $iphoneos_sdk."
              exit 1
              ;;
          esac

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        run: pnpm --filter native release:version "$BUILD_NUMBER"

      - name: Import Apple signing assets
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64"
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD"
          test -n "$APPLE_KEYCHAIN_PASSWORD"
          test -n "$IOS_PROVISIONING_PROFILE_BASE64"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          printf '%s' "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/apple-distribution.p12"
          security import "$RUNNER_TEMP/apple-distribution.p12" \
            -k build.keychain \
            -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          profile_path="$RUNNER_TEMP/malanghub-ios.mobileprovision"
          profile_plist="$RUNNER_TEMP/malanghub-ios-profile.plist"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$profile_path"
          security cms -D -i "$profile_path" > "$profile_plist"

          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist")"
          profile_team="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist")"
          profile_app_identifier="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")"
          profile_bundle_id="${profile_app_identifier#"$profile_team."}"
          profile_get_task_allow="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$profile_plist" 2>/dev/null || echo false)"

          test -n "$profile_uuid"
          test -n "$profile_name"
          test -n "$profile_team"
          test "$profile_bundle_id" = "$MALANGHUB_IOS_BUNDLE_ID"
          if [ "$profile_get_task_allow" = "true" ]; then
            echo "IOS_PROVISIONING_PROFILE_BASE64 must be an App Store distribution profile, not a development profile."
            exit 1
          fi

          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
          echo "MALANGHUB_IOS_PROFILE_UUID=$profile_uuid" >> "$GITHUB_ENV"
          echo "MALANGHUB_IOS_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"
          echo "APPLE_DEVELOPMENT_TEAM=${APPLE_DEVELOPMENT_TEAM:-$profile_team}" >> "$GITHUB_ENV"
          echo "Installed iOS provisioning profile: $profile_name ($profile_uuid)"

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Initialize iOS project
        run: |
          if [ ! -d apps/native/src-tauri/gen/apple ]; then
            pnpm --filter native mobile:init ios
          else
            pnpm --filter native mobile:store-id ios
          fi

      - name: Generate app icons
        run: pnpm --filter native tauri icon src-tauri/icons/icon.png

      - name: Strip alpha channel from iOS app icons
        run: |
          set -euo pipefail
          icon_dir="apps/native/src-tauri/gen/apple/Assets.xcassets/AppIcon.appiconset"
          if [ -d "$icon_dir" ]; then
            while IFS= read -r -d '' f; do
              sips -s format jpeg -s formatOptions 100 "$f" --out /tmp/malanghub_ios_icon_tmp.jpg 2>/dev/null
              sips -s format png /tmp/malanghub_ios_icon_tmp.jpg --out "$f"
            done < <(find "$icon_dir" -name "*.png" -print0)
          fi

      - name: Configure iOS store bundle override
        env:
          MALANGHUB_IOS_EXPORT_METHOD: ${{ inputs.export_method }}
        run: |
          set -euo pipefail
          test -n "$APPLE_DEVELOPMENT_TEAM"
          test -n "$MALANGHUB_IOS_PROFILE_UUID"
          test -n "$MALANGHUB_IOS_PROFILE_NAME"

          wrapper_dir="$RUNNER_TEMP/malanghub-xcodebuild"
          export wrapper_dir
          python3 - <<'PY'
          import os
          import plistlib
          import shlex
          from pathlib import Path

          wrapper_dir = Path(os.environ["wrapper_dir"])
          wrapper_dir.mkdir(parents=True, exist_ok=True)
          bundle_id = os.environ.get("MALANGHUB_IOS_BUNDLE_ID") or "com.malanghub.native"
          team_id = os.environ["APPLE_DEVELOPMENT_TEAM"]
          identity = os.environ.get("MALANGHUB_IOS_CODE_SIGN_IDENTITY") or "Apple Distribution"
          profile_uuid = os.environ["MALANGHUB_IOS_PROFILE_UUID"]
          profile_name = os.environ["MALANGHUB_IOS_PROFILE_NAME"]
          export_method = os.environ.get("MALANGHUB_IOS_EXPORT_METHOD") or "app-store-connect"
          export_options = wrapper_dir / "ExportOptions.plist"
          with export_options.open("wb") as file:
              plistlib.dump(
                  {
                      "destination": "export",
                      "manageAppVersionAndBuildNumber": False,
                      "method": export_method,
                      "provisioningProfiles": {bundle_id: profile_name},
                      "signingCertificate": identity,
                      "signingStyle": "manual",
                      "stripSwiftSymbols": True,
                      "teamID": team_id,
                      "uploadSymbols": True,
                  },
                  file,
              )
          filtered_args = '"${' + 'filtered_args[@]' + '}"'
          script = f"""#!/bin/bash
          set -euo pipefail
          is_export_archive=0
          has_export_options=0
          skip_next=0
          filtered_args=()
          for arg in "$@"; do
            if [ "$skip_next" = "1" ]; then
              skip_next=0
              continue
            fi
            case "$arg" in
              PRODUCT_BUNDLE_IDENTIFIER=*|CODE_SIGN_STYLE=*|DEVELOPMENT_TEAM=*|CODE_SIGN_IDENTITY=*|PROVISIONING_PROFILE=*|PROVISIONING_PROFILE_SPECIFIER=*)
                ;;
              -allowProvisioningUpdates)
                ;;
              -exportArchive)
                is_export_archive=1
                filtered_args+=("$arg")
                ;;
              -exportOptionsPlist)
                has_export_options=1
                skip_next=1
                filtered_args+=("-exportOptionsPlist" {shlex.quote(str(export_options))})
                ;;
              -exportOptionsPlist=*)
                has_export_options=1
                filtered_args+=("-exportOptionsPlist" {shlex.quote(str(export_options))})
                ;;
              *)
                filtered_args+=("$arg")
                ;;
            esac
          done
          if [ "$is_export_archive" = "1" ]; then
            if [ "$has_export_options" = "0" ]; then
              filtered_args+=("-exportOptionsPlist" {shlex.quote(str(export_options))})
            fi
            exec /usr/bin/xcodebuild {filtered_args}
          fi
          exec /usr/bin/xcodebuild {filtered_args} \\
            PRODUCT_BUNDLE_IDENTIFIER={shlex.quote(bundle_id)} \\
            CODE_SIGN_STYLE=Manual \\
            DEVELOPMENT_TEAM={shlex.quote(team_id)} \\
            CODE_SIGN_IDENTITY={shlex.quote(identity)} \\
            PROVISIONING_PROFILE={shlex.quote(profile_uuid)} \\
            PROVISIONING_PROFILE_SPECIFIER={shlex.quote(profile_name)}
          """
          path = wrapper_dir / "xcodebuild"
          path.write_text(script)
          path.chmod(0o755)
          PY
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Build IPA
        run: |
          set -euo pipefail
          pnpm --filter native mobile:store-id ios
          pnpm --filter native tauri ios build \
            --target aarch64 \
            --export-method "${{ inputs.export_method }}" \
            --config src-tauri/tauri.mobile-ci.conf.json \
            --ci
          ipa_path="$(find apps/native/src-tauri/gen/apple -name '*.ipa' -type f | head -n 1)"
          test -n "$ipa_path"
          ipa_extract_dir="$RUNNER_TEMP/malanghub-ipa"
          rm -rf "$ipa_extract_dir"
          mkdir -p "$ipa_extract_dir"
          unzip -q "$ipa_path" -d "$ipa_extract_dir"
          app_info="$(find "$ipa_extract_dir/Payload" -path '*.app/Info.plist' -type f | head -n 1)"
          test -n "$app_info"
          ipa_bundle_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_info")"
          ipa_sdk_name="$(/usr/libexec/PlistBuddy -c 'Print :DTSDKName' "$app_info")"
          if [ "$ipa_bundle_version" != "$BUILD_NUMBER" ]; then
            echo "IPA CFBundleVersion is $ipa_bundle_version, but release build number is $BUILD_NUMBER."
            exit 1
          fi
          sdk_version="${ipa_sdk_name#iphoneos}"
          sdk_major="${sdk_version%%.*}"
          if ! [[ "$sdk_major" =~ ^[0-9]+$ ]] || [ "$sdk_major" -lt 26 ]; then
            echo "IPA was built with $ipa_sdk_name, but App Store uploads require iphoneos26 or later."
            exit 1
          fi
          archive_info="$(find apps/native/src-tauri/gen/apple/build -path '*.xcarchive/Info.plist' -type f | head -n 1 || true)"
          if [ -n "$archive_info" ]; then
            bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :ApplicationProperties:CFBundleIdentifier' "$archive_info")"
            test "$bundle_id" = "$MALANGHUB_IOS_BUNDLE_ID"
          fi
          echo "IPA_PATH=$ipa_path" >> "$GITHUB_ENV"
          echo "IOS_BUNDLE_VERSION=$ipa_bundle_version" >> "$GITHUB_ENV"
          echo "IOS_SDK_NAME=$ipa_sdk_name" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: malanghub-ios-ipa
          path: apps/native/src-tauri/gen/apple/**/*.ipa
          if-no-files-found: error

      - name: Upload IPA to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_IOS_APPLE_ID: ${{ secrets.APP_STORE_CONNECT_IOS_APPLE_ID }}
          APP_STORE_CONNECT_ASC_PUBLIC_ID: ${{ secrets.APP_STORE_CONNECT_ASC_PUBLIC_ID }}
        run: |
          set -euo pipefail
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_IOS_APPLE_ID"
          upload_args=(
            --upload-package "$IPA_PATH"
            --type ios
            --apple-id "$APP_STORE_CONNECT_IOS_APPLE_ID"
            --bundle-id "$MALANGHUB_IOS_BUNDLE_ID"
            --bundle-version "$IOS_BUNDLE_VERSION"
            --bundle-short-version-string "$RELEASE_VERSION"
            --apiKey "$APP_STORE_CONNECT_KEY_ID"
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
          )
          if [ -n "${APP_STORE_CONNECT_ASC_PUBLIC_ID:-}" ]; then
            upload_args+=(--asc-public-id "$APP_STORE_CONNECT_ASC_PUBLIC_ID")
          fi
          xcrun altool "${upload_args[@]}"
