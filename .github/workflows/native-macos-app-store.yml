name: Native macOS App Store

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "CFBundleVersion for this upload."
        required: true
        type: string

concurrency:
  group: native-macos-app-store
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build macOS package and upload to App Store Connect
    runs-on: macos-latest
    env:
      BUILD_NUMBER: ${{ inputs.build_number }}
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_APP_SIGNING_IDENTITY }}
      VITE_API_ADDRESS: ${{ secrets.VITE_API_ADDRESS }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
      VITE_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.VITE_GOOGLE_ANDROID_CLIENT_ID }}
      VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}
      VITE_GOOGLE_IOS_REDIRECT_URI: ${{ secrets.VITE_GOOGLE_IOS_REDIRECT_URI }}
      VITE_TINY_API_KEY: ${{ secrets.VITE_TINY_API_KEY }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply release version
        run: pnpm --filter native release:version "$BUILD_NUMBER"

      - name: Import Apple signing assets
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64"
          test -n "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD"
          test -n "$APPLE_KEYCHAIN_PASSWORD"
          test -n "$MACOS_INSTALLER_CERTIFICATE_BASE64"
          test -n "$MACOS_INSTALLER_CERTIFICATE_PASSWORD"
          test -n "$MACOS_PROVISIONING_PROFILE_BASE64"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          printf '%s' "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/apple-distribution.p12"
          printf '%s' "$MACOS_INSTALLER_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/macos-installer.p12"
          security import "$RUNNER_TEMP/apple-distribution.p12" \
            -k build.keychain \
            -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security import "$RUNNER_TEMP/macos-installer.p12" \
            -k build.keychain \
            -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" \
            -T /usr/bin/productbuild \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain

          mkdir -p apps/native/src-tauri/profiles
          printf '%s' "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 -D > apps/native/src-tauri/profiles/macos-app-store.provisionprofile

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Prepare App Store bundle config
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "$APPLE_TEAM_ID"
          /usr/libexec/PlistBuddy -c "Set :com.apple.application-identifier ${APPLE_TEAM_ID}.com.malanghub.native" apps/native/src-tauri/Entitlements.appstore.plist
          /usr/libexec/PlistBuddy -c "Set :com.apple.developer.team-identifier ${APPLE_TEAM_ID}" apps/native/src-tauri/Entitlements.appstore.plist
          node -e "const fs=require('fs'); const file='apps/native/src-tauri/tauri.appstore.conf.json'; const config=JSON.parse(fs.readFileSync(file,'utf8')); config.bundle ??= {}; config.bundle.macOS ??= {}; config.bundle.macOS.bundleVersion=process.env.BUILD_NUMBER; fs.writeFileSync(file, JSON.stringify(config, null, 2) + '\n');"

      - name: Build signed macOS app
        run: |
          pnpm --filter native tauri build \
            --target universal-apple-darwin \
            --bundles app \
            --config src-tauri/tauri.appstore.conf.json \
            --ci
          app_path="$(find apps/native/src-tauri/target -path '*/bundle/macos/*.app' -type d | head -n 1)"
          test -n "$app_path"
          echo "APP_PATH=$app_path" >> "$GITHUB_ENV"

      - name: Build signed App Store package
        env:
          MACOS_INSTALLER_SIGNING_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          test -n "$MACOS_INSTALLER_SIGNING_IDENTITY"
          pkg_path="$RUNNER_TEMP/Malanghub.pkg"
          xcrun productbuild \
            --component "$APP_PATH" /Applications \
            --sign "$MACOS_INSTALLER_SIGNING_IDENTITY" \
            "$pkg_path"
          echo "PKG_PATH=$pkg_path" >> "$GITHUB_ENV"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: malanghub-macos-app-store-pkg
          path: ${{ runner.temp }}/Malanghub.pkg
          if-no-files-found: error

      - name: Upload package to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_MACOS_APPLE_ID: ${{ secrets.APP_STORE_CONNECT_MACOS_APPLE_ID }}
          APP_STORE_CONNECT_ASC_PUBLIC_ID: ${{ secrets.APP_STORE_CONNECT_ASC_PUBLIC_ID }}
        run: |
          set -euo pipefail
          test -n "$APP_STORE_CONNECT_KEY_ID"
          test -n "$APP_STORE_CONNECT_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_MACOS_APPLE_ID"
          upload_args=(
            --upload-package "$PKG_PATH"
            --type macos
            --apple-id "$APP_STORE_CONNECT_MACOS_APPLE_ID"
            --bundle-id com.malanghub.native
            --bundle-version "$BUILD_NUMBER"
            --bundle-short-version-string "$RELEASE_VERSION"
            --apiKey "$APP_STORE_CONNECT_KEY_ID"
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
          )
          if [ -n "${APP_STORE_CONNECT_ASC_PUBLIC_ID:-}" ]; then
            upload_args+=(--asc-public-id "$APP_STORE_CONNECT_ASC_PUBLIC_ID")
          fi
          xcrun altool "${upload_args[@]}"
